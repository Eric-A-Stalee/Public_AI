    <style id="bulk-print-styles">
      /* ===== Bulk Print — Perplexity Macro Terminal ===== */

      /* On screen: hide the print-only container completely */
      .print-only {
        display: none !important;
      }

      /* --- Print options dialog --- */
      #print-options-dialog {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
      }
      #print-options-dialog.open {
        display: flex;
      }
      #print-options-dialog .dialog-box {
        background: hsl(220 20% 12%);
        border: 1px solid hsl(142 40% 35%);
        border-radius: 8px;
        padding: 24px 32px;
        min-width: 320px;
        font-family: 'Fira Code', 'JetBrains Mono', monospace;
        color: hsl(142 40% 60%);
        box-shadow: 0 0 30px rgba(0,255,100,0.08);
      }
      #print-options-dialog h3 {
        margin: 0 0 16px;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: hsl(142 40% 50%);
        border-bottom: 1px solid hsl(220 15% 25%);
        padding-bottom: 8px;
      }
      #print-options-dialog .orient-btn {
        display: block;
        width: 100%;
        padding: 10px 16px;
        margin-bottom: 8px;
        background: hsl(220 15% 16%);
        border: 1px solid hsl(220 15% 25%);
        border-radius: 4px;
        color: hsl(0 0% 80%);
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.1em;
        cursor: pointer;
        text-align: left;
        transition: all 0.15s;
      }
      #print-options-dialog .orient-btn:hover {
        border-color: hsl(142 40% 45%);
        color: hsl(142 40% 70%);
        background: hsl(220 15% 18%);
      }
      #print-options-dialog .orient-btn .icon {
        display: inline-block;
        border: 1.5px solid currentColor;
        border-radius: 2px;
        margin-right: 10px;
        vertical-align: middle;
        position: relative;
        top: -1px;
      }
      #print-options-dialog .orient-btn .icon.portrait {
        width: 12px;
        height: 16px;
      }
      #print-options-dialog .orient-btn .icon.landscape {
        width: 16px;
        height: 12px;
      }
      #print-options-dialog .cancel-btn {
        display: block;
        width: 100%;
        padding: 8px;
        margin-top: 8px;
        background: transparent;
        border: 1px solid hsl(220 15% 25%);
        border-radius: 4px;
        color: hsl(220 10% 50%);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.15s;
      }
      #print-options-dialog .cancel-btn:hover {
        border-color: hsl(0 60% 50%);
        color: hsl(0 60% 65%);
      }

      /* Temporarily visible so Recharts can measure & paint SVGs.
         Positioned offscreen so the user doesn't see a flash. */
      .print-ready.print-only {
        display: block !important;
        position: fixed !important;
        left: -9999px !important;
        top: 0 !important;
        width: 9.5in !important;        /* landscape width; portrait still fits */
        visibility: visible !important;
        z-index: -1 !important;
      }

      @media print {
        /* --- Hide the React app root and dialog during print --- */
        #root, #print-options-dialog {
          display: none !important;
        }

        /* --- Show the print container (lives on <body> during print) --- */
        .print-only {
          display: block !important;
        }

        /* --- Override terminal dark theme to printer-friendly --- */
        :root {
          --term-green: 142 30% 20% !important;
          --term-red: 0 72% 40% !important;
          --term-amber: 45 80% 35% !important;
          --term-cyan: 185 60% 30% !important;
          --term-dim: 220 10% 35% !important;
          --term-bg: 0 0% 100% !important;
          --term-surface: 0 0% 97% !important;
          --term-border: 220 10% 75% !important;
          --background: 0 0% 100% !important;
          --foreground: 220 15% 15% !important;
          --card: 0 0% 97% !important;
          --card-foreground: 220 15% 15% !important;
          --primary: 142 40% 30% !important;
          --primary-foreground: 0 0% 100% !important;
          --secondary: 220 10% 92% !important;
          --secondary-foreground: 220 15% 15% !important;
          --muted: 220 10% 92% !important;
          --muted-foreground: 220 10% 40% !important;
          --border: 220 10% 80% !important;
        }

        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        html, body {
          background: #fff !important;
          color: #1a1a2e !important;
          height: auto !important;
          overflow: visible !important;
        }

        /* --- Page setup (orientation set dynamically by #print-page-size) --- */
        @page {
          margin: 0.6in 0.5in;
        }

        /* --- #print-all-container is a direct child of <body> during print,
               completely outside the flex layout. Page breaks now work. --- */
        #print-all-container {
          display: block !important;
          position: static !important;
          overflow: visible !important;
          width: 100% !important;
          background: #fff !important;
        }

        /* --- Each tab section on its own page --- */
        .print-section {
          display: block !important;
          page-break-before: always !important;
          break-before: page !important;
        }
        /* First section flows after the title header */
        .print-section:first-of-type {
          page-break-before: avoid !important;
          break-before: auto !important;
        }

        /* --- Unlock overflow/height inside sections so nothing clips --- */
        #print-all-container *  {
          overflow: visible !important;
          max-height: none !important;
        }
        #print-all-container .h-screen,
        #print-all-container .min-h-screen {
          height: auto !important;
          min-height: auto !important;
        }

        /* --- Dark backgrounds → white for print --- */
        [class*="bg-[hsl(220"] {
          background-color: #fff !important;
        }
        [class*="bg-[hsl(var(--term-bg"])],
        [class*="bg-[hsl(var(--term-surface")] {
          background-color: #fff !important;
        }

        /* --- All text → dark for readability --- */
        [class*="text-[hsl(var(--term-green"])],
        [class*="text-[hsl(var(--term-dim"])],
        [class*="text-[hsl(var(--term-cyan"])],
        h1, h2, h3, h4, h5, h6, p, span, div, td, th, li {
          color: #1a1a2e !important;
        }

        /* --- Keep red/amber semantic colors for risk indicators --- */
        [class*="text-[hsl(var(--term-red"])] {
          color: #c0392b !important;
        }
        [class*="text-[hsl(var(--term-amber"])] {
          color: #b8860b !important;
        }

        /* --- Section headers: numbered, bold with underline --- */
        .section-label {
          color: #1a1a2e !important;
          font-size: 14pt !important;
          font-weight: 700 !important;
          letter-spacing: 0.15em !important;
          border-bottom: 2px solid #1a1a2e !important;
          padding-bottom: 4pt !important;
          margin-bottom: 10pt !important;
        }

        /* --- Report title --- */
        .print-header h1 {
          color: #1a1a2e !important;
          font-size: 16pt !important;
          font-weight: 700 !important;
          border-bottom: 3px double #1a1a2e !important;
          padding-bottom: 6pt !important;
          margin-bottom: 16pt !important;
        }

        /* --- Borders → visible on paper --- */
        [class*="border-[hsl(var(--term-border"])],
        [class*="border-[hsl(var(--term-green"])] {
          border-color: #ccc !important;
        }

        /* --- Remove glow/shadow effects --- */
        [class*="glow"],
        [class*="shadow"] {
          text-shadow: none !important;
          box-shadow: none !important;
          filter: none !important;
        }

        /* --- Charts: ensure SVGs print and don't split pages --- */
        svg {
          max-width: 100% !important;
          height: auto !important;
        }
        .recharts-wrapper {
          page-break-inside: avoid !important;
          break-inside: avoid !important;
        }

        /* --- Tables & grids: avoid page splits --- */
        table, [class*="grid"] {
          page-break-inside: avoid;
          break-inside: avoid;
        }

        /* --- Links: show URLs on paper --- */
        a[href]:after {
          content: " (" attr(href) ")";
          font-size: 8pt;
          color: #666;
        }
      }
    </style>

    <!--
      Print pipeline:
      1. Override window.print() → show orientation dialog
      2. User picks portrait/landscape → inject @page size rule
      3. Move #print-all-container to <body> (escapes flex → page breaks work)
      4. Make it visible so Recharts SVGs can measure & paint
      5. Wait 800ms for charts to render
      6. Call the real window.print()
      7. On afterprint, hide it and move it back into React tree
    -->
    <script>
      (function () {
        var realPrint = window.print.bind(window);
        var container, reactParent, printing = false;

        /* Dynamic @page size rule */
        var pageSizeStyle = document.createElement("style");
        pageSizeStyle.id = "print-page-size";
        pageSizeStyle.textContent = "@page { size: letter; }";
        document.head.appendChild(pageSizeStyle);

        function setOrientation(orient) {
          pageSizeStyle.textContent = orient === "landscape"
            ? "@page { size: letter landscape; }"
            : "@page { size: letter; }";
        }

        /* Restore DOM after print dialog closes */
        window.addEventListener("afterprint", function () {
          if (container && reactParent) {
            container.style.display = "";
            container.classList.remove("print-ready");
            reactParent.appendChild(container);
            container = null;
            reactParent = null;
          }
          printing = false;
        });

        /* The actual print sequence after orientation is chosen */
        function executePrint() {
          container = document.getElementById("print-all-container");
          if (!container) { realPrint(); return; }

          reactParent = container.parentNode;
          document.body.appendChild(container);
          container.style.display = "block";
          container.classList.add("print-ready");

          setTimeout(function () {
            container.style.display = "";
            realPrint();
          }, 800);
        }

        /* Override window.print to show orientation picker */
        window.print = function () {
          if (printing) return;
          printing = true;

          var dialog = document.getElementById("print-options-dialog");
          if (dialog) {
            dialog.classList.add("open");
          } else {
            /* Fallback if dialog HTML hasn't loaded yet */
            executePrint();
          }
        };

        /* Expose helpers for the dialog buttons */
        window.__printWithOrientation = function (orient) {
          var dialog = document.getElementById("print-options-dialog");
          if (dialog) dialog.classList.remove("open");
          setOrientation(orient);
          executePrint();
        };
        window.__cancelPrint = function () {
          var dialog = document.getElementById("print-options-dialog");
          if (dialog) dialog.classList.remove("open");
          printing = false;
        };
      })();
    </script>
  </head>
  <body>
    <!-- Print orientation picker dialog -->
    <div id="print-options-dialog">
      <div class="dialog-box">
        <h3>Print Orientation</h3>
        <button class="orient-btn" onclick="window.__printWithOrientation('portrait')">
          <span class="icon portrait"></span> PORTRAIT
        </button>
        <button class="orient-btn" onclick="window.__printWithOrientation('landscape')">
          <span class="icon landscape"></span> LANDSCAPE
        </button>
        <button class="cancel-btn" onclick="window.__cancelPrint()">CANCEL</button>
      </div>
    </div>
    <div id="root"></div>
  </body>
